name: Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_VM_PROJECT }}

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Open IAP TCP tunnel and deploy
        run: |
          # Start IAP TCP tunnel: routes localhost:2222 → VM:22 via Google's IAP
          gcloud compute start-iap-tunnel \
            ${{ secrets.GCP_VM_NAME }} 22 \
            --local-host-port=localhost:2222 \
            --zone=${{ secrets.GCP_VM_ZONE }} \
            --project=${{ secrets.GCP_VM_PROJECT }} &
          IAP_PID=$!

          # Give tunnel a moment to establish
          sleep 6

          # Deploy over the tunnel
          ssh \
            -i ~/.ssh/deploy_key \
            -p 2222 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            ${{ secrets.GCP_VM_USER }}@localhost "
              set -e
              cd ~/swing-options-monitor
              echo '── Pulling latest code ──'
              git fetch origin main
              git reset --hard origin/main
              echo '── Installing dependencies ──'
              npm ci --omit=dev --quiet
              echo '── Restarting bot ──'
              pm2 restart swing-options-bot --update-env || pm2 start ecosystem.config.js
              pm2 save
              echo '── Status ──'
              pm2 list
              echo '✅ Deploy done at \$(date)'
            "

          kill $IAP_PID 2>/dev/null || true
